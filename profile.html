<!DOCTYPE html>
<html>
<head>
    <title>Profile - InvoiceKit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2>InvoiceKit</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="clients.html">Clients</a>
        <a href="invoices.html">Invoices</a>
        <a href="profile.html">Profile</a>

        <button onclick="logout()">Logout</button>
    </div>

    <div class="main-content">

        <h1>Update Bank Details</h1>

        <div class="form-card">

            <input type="text" id="bankName" placeholder="Bank Name">

            <input type="text" id="accountNumber" placeholder="Account Number">

            <input type="text" id="ifscCode" placeholder="IFSC Code">

            <input type="text" id="accountHolderName" placeholder="Account Holder Name">

            <input type="text" id="upiId" placeholder="UPI ID">

            <button onclick="updateProfile()">
                Update Profile
            </button>

        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
