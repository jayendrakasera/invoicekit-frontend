<!DOCTYPE html>
<html>
<head>
    <title>Clients - InvoiceKit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>InvoiceKit</h2>

        <a href="dashboard.html">Dashboard</a>
        <a href="clients.html">Clients</a>
        <a href="invoices.html">Invoices</a>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h1>Client Management</h1>

        <!-- Search -->
        <input type="text" id="searchClient" placeholder="Search client">
        <button onclick="searchClients()">Search</button>

        <br><br>

        <!-- Add Client Form -->
        <div class="client-card">

            <input type="text" id="name" placeholder="Client Name">
            <input type="email" id="email" placeholder="Client Email">
            <input type="text" id="phone" placeholder="Phone">
            <input type="text" id="address" placeholder="Address">
            <input type="text" id="gstNumber" placeholder="GST Number">

            <button onclick="addClient()">Add Client</button>

        </div>

        <br>

        <!-- Client List -->
        <h2>Client List</h2>
        <div id="clientList"></div>

        <br>

        <!-- Pagination -->
        <div class="pagination">
    <button onclick="prevClientPage()">Previous</button>
    <button onclick="nextClientPage()">Next</button>
</div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/client.js"></script>

</body>
</html>
