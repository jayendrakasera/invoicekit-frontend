<!DOCTYPE html>
<html>
<head>
    <title>Register - InvoiceKit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2>Register</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="text" id="companyName" placeholder="Company Name">
        <input type="text" id="gstNumber" placeholder="GST Number">

        <input type="text" id="bankName" placeholder="Bank Name">
        <input type="text" id="accountNumber" placeholder="Account Number">
        <input type="text" id="ifscCode" placeholder="IFSC Code">
        <input type="text" id="accountHolderName" placeholder="Account Holder Name">
        <input type="text" id="upiId" placeholder="UPI ID">

        <button onclick="register()">Register</button>

        <p>
            Already have an account?
            <a href="index.html">Login</a>
        </p>
        </div>
    
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    </div>
</body>
</html>
