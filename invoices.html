<!DOCTYPE html>
<html>
<head>
    <title>Invoices - InvoiceKit</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>InvoiceKit</h2>

        <a href="profile.html">Profile</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="clients.html">Clients</a>
        <a href="invoices.html">Invoices</a>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <h1>Invoice Management</h1>
        <div class="toolbar">
        <!-- Search + Filters -->
        <input type="text" id="search" placeholder="Search invoices">
        <button onclick="searchInvoices()">Search</button>

        <br><br>

        <select id="statusFilter" onchange="filterByStatus()">
            <option value="">Filter Status</option>
            <option value="PAID">PAID</option>
            <option value="PENDING">PENDING</option>
        </select>

        <select id="amountSort" onchange="sortByAmount()">
            <option value="">Sort Amount</option>
            <option value="asc">Low to High</option>
            <option value="desc">High to Low</option>
        </select>

        <select id="dateSort" onchange="sortByDate()">
            <option value="">Sort Date</option>
            <option value="asc">Oldest First</option>
            <option value="desc">Newest First</option>
        </select>

        <br><br>

        </div>

        <!-- Create Invoice Form -->
        <div class="invoice-card">

            <h2>Create Invoice</h2>

            <select id="clientSelect"></select>

            <label for="issueDate">Issue Date</label>
            <input type="date" id="issueDate" >

            <label for="dueDate">Due Date</label>
            <input type="date" id="dueDate" >
            <input type="number" id="gstPercentage" placeholder="GST Percentage">
            <input type="text" id="notes" placeholder="Notes">

            <h3>Invoice Items</h3>

            <div id="itemsContainer"></div>

            <button onclick="addItemField()">Add Item</button>
            <button onclick="createInvoice()">Create Invoice</button>

        </div>

        <br>

        <!-- Invoice List -->
        <h2>Invoice List</h2>
        <div id="invoiceList"></div>

        <br>

        <!-- Pagination -->
        <button onclick="prevInvoicePage()">Previous</button>
        <button onclick="nextInvoicePage()">Next</button>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/invoice.js"></script>

</body>
</html>
